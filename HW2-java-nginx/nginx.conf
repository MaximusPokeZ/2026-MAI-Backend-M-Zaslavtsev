worker_processes  1;

events {
    worker_connections  1024;
}


http {
    types {
        text/html                             html htm;
        image/jpeg                            jpeg jpg;
        image/png                             png;
        video/mp4                             mp4;
        application/octet-stream              bin;
    }
    default_type  application/octet-stream;

    upstream java_app {
        server 127.0.0.1:8081;
    }

    server {
        listen       8080;
        server_name  localhost;

        location /public/ {
            alias /Users/mzaslav/Desktop/ЛР/2026-MAI-Backend-M-Zaslavtsev/HW2-java-nginx/public/;
            autoindex on;
        }

        location /pswd-gen {
            rewrite ^/pswd-gen(.*) /$1 break;
            
            proxy_pass http://java_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
