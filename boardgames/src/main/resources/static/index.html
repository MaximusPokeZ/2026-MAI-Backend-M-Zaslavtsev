<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Настольные игры — Live</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #222;
      padding: 32px 20px;
    }
    .header {
      max-width: 700px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    h1 { font-size: 24px; font-weight: 700; }
    #status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s;
    }
    #status.connected    { background: #d1fae5; color: #065f46; }
    #status.disconnected { background: #fee2e2; color: #991b1b; }
    #status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    #status.connected .dot    { background: #10b981; }
    #status.disconnected .dot { background: #ef4444; }

    #games-list { max-width: 700px; margin: 0 auto; }

    .game-card {
      background: white;
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      border-left: 4px solid transparent;
      transition: border-color 0.3s;
    }
    .game-card.new {
      border-left-color: #10b981;
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .game-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .game-description { font-size: 14px; color: #555; margin-bottom: 10px; line-height: 1.4; }
    .game-category {
      display: inline-block;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .game-id { float: right; font-size: 12px; color: #aaa; }
    .empty { text-align: center; color: #aaa; margin-top: 60px; font-size: 15px; }
  </style>
</head>
<body>

<div class="header">
  <h1>Настольные игры</h1>
  <span id="status" class="disconnected">
    <span class="dot"></span>
    WebSocket отключён
  </span>
</div>

<div id="games-list">
  <p class="empty">Загрузка...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/centrifuge@5/dist/centrifuge.js"></script>
<script>
  const listEl = document.getElementById('games-list');
  const statusEl = document.getElementById('status');

  function renderCard(game, isNew) {
    const card = document.createElement('div');
    card.className = 'game-card' + (isNew ? ' new' : '');
    card.innerHTML =
      '<span class="game-id">#' + game.id + '</span>' +
      '<div class="game-title">' + escHtml(game.title) + '</div>' +
      '<div class="game-description">' + escHtml(game.description || 'Описание отсутствует') + '</div>' +
      (game.categoryName
        ? '<span class="game-category">' + escHtml(game.categoryName) + '</span>'
        : '');
    return card;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Загружаем все игры при открытии страницы
  fetch('/api/games/')
    .then(r => r.json())
    .then(games => {
      listEl.innerHTML = '';
      if (games.length === 0) {
        listEl.innerHTML = '<p class="empty">Игр пока нет. Создайте первую через API!</p>';
        return;
      }
      games.forEach(g => listEl.appendChild(renderCard(g, false)));
    })
    .catch(() => {
      listEl.innerHTML = '<p class="empty">Не удалось загрузить игры</p>';
    });

  // Подключаемся к Centrifugo
  const centrifuge = new Centrifuge('ws://localhost:8000/connection/websocket');

  centrifuge.on('connected', () => {
    statusEl.className = 'connected';
    statusEl.innerHTML = '<span class="dot"></span> WebSocket подключён';
  });
  centrifuge.on('disconnected', () => {
    statusEl.className = 'disconnected';
    statusEl.innerHTML = '<span class="dot"></span> WebSocket отключён';
  });

  // Подписываемся на канал "games"
  const sub = centrifuge.newSubscription('games');
  sub.on('publication', ctx => {
    // Новая игра добавлена через API — вставляем карточку в начало без перезагрузки страницы
    if (listEl.querySelector('.empty')) listEl.innerHTML = '';
    listEl.insertBefore(renderCard(ctx.data, true), listEl.firstChild);
  });
  sub.subscribe();

  centrifuge.connect();
</script>

</body>
</html>
