events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        location /web/ {
            proxy_pass http://host.docker.internal:8080/web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://host.docker.internal:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = / {
            return 301 /web/;
        }
    }
}