version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: boardgames-postgres
    environment:
      POSTGRES_DB: boardgames_db
      POSTGRES_USER: mzaslav
      POSTGRES_PASSWORD: mzaslav
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mzaslav -d boardgames_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: boardgames-spring-app
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/boardgames_db
      - SPRING_DATASOURCE_USERNAME=mzaslav
      - SPRING_DATASOURCE_PASSWORD=mzaslav
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/games/"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: boardgames-nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
